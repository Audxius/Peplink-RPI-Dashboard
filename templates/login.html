<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Peplink Login</title>

        <style>
            :root {
                --bg: #f4f6fb;
                --card: #ffffff;
                --bd: #d8deea;
                --text: #0f172a;
                --muted: #475569;
                --ok: #1a7f37;
                --bad: #b00020;
                --btnbg: #ffffff;
                --btnbgHover: #f1f5f9;
            }

            html[data-theme="dark"] {
                --bg: #0f1115;
                --card: #151a22;
                --bd: #2a3240;
                --text: #e7eaf0;
                --muted: #a8b0bf;
                --ok: #2bd67b;
                --bad: #ff4d6d;
                --btnbg: #1b2230;
                --btnbgHover: #222b3d;
            }

            * {
                box-sizing: border-box;
            }
            body {
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                background: var(--bg);
                color: var(--text);
                font-family:
                    system-ui,
                    -apple-system,
                    Segoe UI,
                    Roboto,
                    sans-serif;
            }

            .wrap {
                width: min(520px, 92vw);
            }
            .topbar {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 12px;
                gap: 10px;
            }

            h2 {
                margin: 0;
                font-size: 30px;
                line-height: 1.1;
            }
            .hint {
                color: var(--muted);
                font-size: 14px;
            }

            .card {
                background: var(--card);
                border: 1px solid var(--bd);
                border-radius: 18px;
                padding: 16px;
            }

            label {
                display: block;
                font-weight: 700;
                margin-top: 12px;
                margin-bottom: 6px;
            }
            input {
                width: 100%;
                padding: 12px 12px;
                border-radius: 14px;
                border: 1px solid var(--bd);
                background: transparent;
                color: var(--text);
                font-size: 16px;
                outline: none;
            }
            input:focus {
                border-color: rgba(90, 140, 255, 0.65);
            }

            .btnrow {
                display: flex;
                gap: 10px;
                margin-top: 14px;
                align-items: center;
                justify-content: space-between;
                flex-wrap: wrap;
            }
            button.btn {
                padding: 10px 14px;
                border-radius: 14px;
                border: 1px solid var(--bd);
                background: var(--btnbg);
                color: var(--text);
                cursor: pointer;
                font-size: 16px;
                font-weight: 650;
            }
            button.btn:hover {
                background: var(--btnbgHover);
            }

            .msg {
                margin: 10px 0 0 0;
                padding: 10px 12px;
                border-radius: 14px;
                border: 1px solid var(--bd);
                font-size: 15px;
            }
            .msg.ok {
                border-color: rgba(43, 214, 123, 0.35);
                color: var(--ok);
            }
            .msg.error {
                border-color: rgba(255, 77, 109, 0.35);
                color: var(--bad);
            }

            details {
                margin-top: 12px;
            }
            pre {
                margin: 10px 0 0 0;
                padding: 12px;
                border-radius: 14px;
                border: 1px solid var(--bd);
                background: rgba(0, 0, 0, 0.06);
                overflow: auto;
                font-size: 13px;
                white-space: pre-wrap;
                word-break: break-word;
            }
            html[data-theme="dark"] pre {
                background: rgba(255, 255, 255, 0.04);
            }
        </style>
    </head>

    <body>
        <div class="wrap">
            <div class="topbar">
                <div>
                    <h2>Login</h2>
                    <div class="hint">
                        Connects to router API and stores a session cookie.
                    </div>
                </div>
                <button class="btn" id="btnTheme" onclick="toggleTheme()">
                    Theme: Light
                </button>
            </div>

            <div class="card">
                {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %} {% for cat, m in messages %}
                <div class="msg {{ cat }}">{{ m }}</div>
                {% endfor %} {% endif %} {% endwith %}

                <form method="post">
                    <label>Username</label>
                    <input name="username" autocomplete="username" />

                    <label>Password</label>
                    <input
                        name="password"
                        type="password"
                        autocomplete="current-password"
                    />

                    <div class="btnrow">
                        <button class="btn" type="submit">Log in</button>
                        <div class="hint">Default theme: Light</div>
                    </div>
                </form>

                {% if raw %}
                <details>
                    <summary class="hint">Show router response</summary>
                    <pre>{{ raw }}</pre>
                </details>
                {% endif %}
            </div>
        </div>

        <script>
            function loadTheme() {
                if (localStorage.getItem("theme") === null)
                    localStorage.setItem("theme", "light");
                applyTheme();
            }

            function applyTheme() {
                const theme = localStorage.getItem("theme") || "light";
                document.documentElement.setAttribute(
                    "data-theme",
                    theme === "dark" ? "dark" : "light",
                );
                document.getElementById("btnTheme").textContent =
                    theme === "dark" ? "Theme: Dark" : "Theme: Light";
            }

            function toggleTheme() {
                const theme = localStorage.getItem("theme") || "light";
                localStorage.setItem(
                    "theme",
                    theme === "dark" ? "light" : "dark",
                );
                applyTheme();
            }

            loadTheme();
        </script>
    </body>
</html>
